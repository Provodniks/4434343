<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТехноОптТорг | Обращения клиентов</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- SheetJS (XLSX) для экспорта в Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0b0b2b;
            --primary-light: #1a0a4f;
            --neon-purple: #9b59b6;
            --neon-blue: #3498db;
            --neon-cyan: #00ffff;
            --accent: #9b59b6;
            --accent-hover: #bb6bc9;
            --gray-bg: #f4f7fc;
            --text-dark: #1e2a3e;
            --text-gray: #5a6e7c;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.2);
            --shadow-hover: 0 20px 40px rgba(155,89,182,0.3);
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', -apple-system, Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0b0b2b 0%, #1a0a4f 50%, #0a0a3b 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный градиентный фон */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(155,89,182,0.05) 0%, rgba(52,152,219,0.05) 50%, rgba(0,0,0,0) 70%);
            animation: rotateBg 40s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Неоновые частицы */
        .particle {
            position: fixed;
            background: radial-gradient(circle, var(--neon-purple), var(--neon-blue));
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: float 15s infinite ease-in-out;
            opacity: 0.15;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.1; }
            50% { transform: translateY(-50px) translateX(30px); opacity: 0.25; }
        }

        /* Бегущие неоновые огоньки по краям */
        .running-lights {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .running-lights::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--neon-purple), var(--neon-cyan), var(--neon-blue), transparent);
            animation: runLightHorizontal 4s linear infinite;
            box-shadow: 0 0 8px var(--neon-purple);
        }

        .running-lights::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: -100%;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-purple), transparent);
            animation: runLightHorizontalReverse 4s linear infinite 2s;
            box-shadow: 0 0 8px var(--neon-blue);
        }

        @keyframes runLightHorizontal {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @keyframes runLightHorizontalReverse {
            0% { right: -100%; }
            100% { right: 100%; }
        }

        /* Вертикальные бегущие огоньки */
        .running-lights-vertical {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .running-lights-vertical::before {
            content: '';
            position: absolute;
            left: 0;
            top: -100%;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, transparent, var(--neon-cyan), var(--neon-purple), var(--neon-blue), transparent);
            animation: runLightVertical 5s linear infinite;
            box-shadow: 0 0 8px var(--neon-cyan);
        }

        .running-lights-vertical::after {
            content: '';
            position: absolute;
            right: 0;
            bottom: -100%;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, transparent, var(--neon-blue), var(--neon-purple), var(--neon-cyan), transparent);
            animation: runLightVerticalReverse 5s linear infinite 2.5s;
            box-shadow: 0 0 8px var(--neon-blue);
        }

        @keyframes runLightVertical {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        @keyframes runLightVerticalReverse {
            0% { bottom: -100%; }
            100% { bottom: 100%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header с неоновой рамкой */
        .header {
            background: linear-gradient(135deg, rgba(11,11,43,0.95), rgba(26,10,79,0.95));
            backdrop-filter: blur(10px);
            color: white;
            border-radius: 20px;
            margin-bottom: 30px;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(155,89,182,0.5);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .header::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-blue), var(--neon-cyan), var(--neon-purple));
            border-radius: 20px;
            z-index: -1;
            animation: neonShimmer 2s infinite;
        }

        @keyframes neonShimmer {
            0% { opacity: 0.2; }
            50% { opacity: 0.7; }
            100% { opacity: 0.2; }
        }

        .header:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(155,89,182,0.3);
        }

        .logo h1 {
            font-size: 1.5rem;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 5px var(--neon-purple);
        }

        .logo h1::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan), var(--neon-blue));
            animation: runningLine 3s ease-in-out infinite;
            box-shadow: 0 0 5px var(--neon-purple);
        }

        @keyframes runningLine {
            0% { width: 0; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0; left: 100%; }
        }

        .logo a {
            color: white;
            text-decoration: none;
        }

        .back-link {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(155,89,182,0.2);
            border-radius: 30px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(155,89,182,0.5);
        }

        .back-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(155,89,182,0.5), transparent);
            transition: left 0.5s;
        }

        .back-link:hover::before {
            left: 100%;
        }

        .back-link:hover {
            background: rgba(155,89,182,0.8);
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        .form-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            animation: fadeInUp 0.5s ease;
            position: relative;
            border: 1px solid rgba(155,89,182,0.3);
        }

        .form-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--neon-purple);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* СЛАБОЕ МЕРЦАНИЕ для заголовка "Новое обращение" */
        .form-title {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: var(--primary);
            border-left: 4px solid var(--neon-purple);
            padding-left: 15px;
            position: relative;
            display: inline-block;
            animation: textSoftGlow 2s ease-in-out infinite;
            text-shadow: 0 0 3px var(--neon-purple);
        }

        @keyframes textSoftGlow {
            0%, 100% { 
                text-shadow: 0 0 2px var(--neon-purple);
                color: var(--primary);
            }
            50% { 
                text-shadow: 0 0 6px var(--neon-purple), 0 0 8px var(--neon-blue);
                color: #2a1a5a;
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: var(--transition);
            font-family: inherit;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--neon-purple);
            box-shadow: 0 0 8px rgba(155,89,182,0.3);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 8px rgba(155,89,182,0.5);
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--neon-purple);
        }

        .table-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            animation: fadeInUp 0.5s ease 0.1s both;
            position: relative;
            border: 1px solid rgba(155,89,182,0.3);
        }

        .table-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-blue);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .table-title {
            font-size: 1.5rem;
            color: var(--primary);
            position: relative;
        }

        .table-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
            animation: neonLineGlow 1.5s infinite alternate;
            border-radius: 3px;
        }

        @keyframes neonLineGlow {
            from { box-shadow: 0 0 2px var(--neon-purple); width: 60px; }
            to { box-shadow: 0 0 10px var(--neon-cyan); width: 90px; }
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            width: 250px;
            transition: var(--transition);
        }

        .search-box input:focus {
            border-color: var(--neon-purple);
            outline: none;
            box-shadow: 0 0 10px rgba(155,89,182,0.3);
        }

        .search-box button {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
        }

        .search-box button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 12px var(--neon-purple);
        }

        .export-all-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--success), #27ae60);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-left: 10px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .export-all-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .export-all-btn:hover::before {
            left: 100%;
        }

        .export-all-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 12px var(--success);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: linear-gradient(135deg, #f4f7fc, #e8edf2);
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        th:hover::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
            animation: slideIn 0.3s ease;
            box-shadow: 0 0 5px var(--neon-purple);
        }

        @keyframes slideIn {
            from { width: 0; left: 50%; }
            to { width: 100%; left: 0; }
        }

        th:hover {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            color: white;
        }

        tr {
            transition: var(--transition);
        }

        tr:hover {
            background: rgba(155,89,182,0.08);
            transform: scale(1.01);
        }

        .status-new {
            background: linear-gradient(135deg, #e3f2fd, #bbdef5);
            color: #1976d2;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            animation: statusSoftGlow 2s infinite;
        }

        @keyframes statusSoftGlow {
            0%, 100% { box-shadow: 0 0 0px rgba(25,118,210,0); background: linear-gradient(135deg, #e3f2fd, #bbdef5); }
            50% { box-shadow: 0 0 8px rgba(25,118,210,0.4); background: linear-gradient(135deg, #bbdef5, #90caf9); }
        }

        .status-processing {
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            color: #ff9800;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-done {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            color: #4caf50;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .action-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btns button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .edit-btn {
            color: var(--warning);
        }

        .edit-btn:hover {
            background: rgba(243,156,18,0.2);
            transform: scale(1.2) rotate(15deg);
        }

        .delete-btn {
            color: var(--danger);
        }

        .delete-btn:hover {
            background: rgba(231,76,60,0.2);
            transform: scale(1.2) rotate(-15deg);
        }

        .export-excel-btn {
            color: var(--success);
        }

        .export-excel-btn:hover {
            background: rgba(46,204,113,0.2);
            transform: scale(1.2);
        }

        /* Статистика */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
            animation: fadeInUp 0.4s ease both;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(155,89,182,0.3);
        }

        .stat-card:nth-child(1) { animation-delay: 0s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.2s; }
        .stat-card:nth-child(4) { animation-delay: 0.3s; }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(155,89,182,0.15), transparent);
            transition: left 0.5s;
        }

        .stat-card:hover::before {
            left: 100%;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            background: rgba(255,255,255,0.95);
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(155,89,182,0.3);
        }

        /* СЛАБОЕ МЕРЦАНИЕ для иконки конверта (Всего обращений) */
        .stat-card:nth-child(1) i {
            animation: iconSoftPulse 2s ease-in-out infinite;
        }

        @keyframes iconSoftPulse {
            0%, 100% { opacity: 0.7; text-shadow: 0 0 2px var(--neon-purple); }
            50% { opacity: 1; text-shadow: 0 0 8px var(--neon-purple); }
        }

        .stat-card i {
            font-size: 2rem;
            color: var(--neon-purple);
            margin-bottom: 10px;
            display: inline-block;
            text-shadow: 0 0 3px var(--neon-purple);
        }

        /* Вращение иконки "В работе" */
        .stat-card:nth-child(3) i {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Покачивание иконки "Завершено" */
        .stat-card:nth-child(4) i {
            animation: wobble 3s ease-in-out infinite;
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(4deg); }
            75% { transform: rotate(-4deg); }
        }

        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-card .stat-label {
            color: var(--text-gray);
            font-size: 0.85rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            position: relative;
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(155,89,182,0.3);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 1.3rem;
            color: var(--primary);
        }

        .close-modal {
            font-size: 28px;
            cursor: pointer;
            color: var(--text-gray);
            transition: var(--transition);
        }

        .close-modal:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 1001;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 0 15px rgba(155,89,182,0.5);
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 1000px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="running-lights"></div>
    <div class="running-lights-vertical"></div>

    <script>
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 80 + 40 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = 15 + Math.random() * 20 + 's';
            document.body.appendChild(particle);
        }
    </script>

    <div class="container">
        <div class="header">
            <div class="logo">
                <h1><i class="fas fa-clipboard-list"></i> <a href="index.html" style="color:white;">ТехноОптТорг</a></h1>
                <p style="font-size: 12px; opacity: 0.8;">Система управления обращениями клиентов</p>
            </div>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <i class="fas fa-envelope"></i>
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Всего обращений</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <div class="stat-value" id="newCount">0</div>
                <div class="stat-label">Новые</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-spinner"></i>
                <div class="stat-value" id="processingCount">0</div>
                <div class="stat-label">В работе</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <div class="stat-value" id="doneCount">0</div>
                <div class="stat-label">Завершено</div>
            </div>
        </div>

        <div class="dashboard">
            <div class="form-card">
                <h2 class="form-title"><i class="fas fa-plus-circle"></i> Новое обращение</h2>
                <form id="appealForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Имя контрагента <span class="required">*</span></label>
                            <input type="text" id="name" placeholder="ООО 'Ромашка' или Иванов Иван" required>
                        </div>
                        <div class="form-group">
                            <label>Тип обращения <span class="required">*</span></label>
                            <select id="type" required>
                                <option value="">Выберите тип</option>
                                <option value="Вопрос">❓ Вопрос</option>
                                <option value="Заказ">🛒 Заказ</option>
                                <option value="Жалоба">⚠️ Жалоба</option>
                                <option value="Предложение">💡 Предложение</option>
                                <option value="Рекламация">📦 Рекламация</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Ответственный</label>
                            <select id="responsible">
                                <option value="">Выберите ответственного</option>
                                <option value="Администратор">👨‍💼 Администратор</option>
                                <option value="Менеджер">📋 Менеджер</option>
                                <option value="Кладовщик">📦 Кладовщик</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Email <span class="required">*</span></label>
                            <input type="email" id="email" placeholder="client@example.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Суть обращения <span class="required">*</span></label>
                        <textarea id="description" placeholder="Опишите суть обращения..." required></textarea>
                    </div>
                    <input type="hidden" id="date" readonly>
                    <input type="hidden" id="source" value="Сайт">
                    <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Отправить обращение</button>
                </form>
            </div>

            <div class="table-card">
                <div class="table-header">
                    <h2 class="table-title"><i class="fas fa-table"></i> Список обращений</h2>
                    <div style="display: flex; gap: 10px;">
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Поиск по имени или email...">
                            <button onclick="searchAppeals()"><i class="fas fa-search"></i></button>
                        </div>
                        <button class="export-all-btn" onclick="exportAllToExcel()"><i class="fas fa-file-excel"></i> Экспорт всех</button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table id="appealsTable">
                        <thead>
                            <tr>
                                <th onclick="sortTable(0)">№ <i class="fas fa-sort"></i></th>
                                <th onclick="sortTable(1)">Дата <i class="fas fa-sort"></i></th>
                                <th onclick="sortTable(2)">Контрагент <i class="fas fa-sort"></i></th>
                                <th onclick="sortTable(3)">Тип <i class="fas fa-sort"></i></th>
                                <th onclick="sortTable(4)">Источник <i class="fas fa-sort"></i></th>
                                <th onclick="sortTable(5)">Ответственный <i class="fas fa-sort"></i></th>
                                <th onclick="sortTable(6)">Статус <i class="fas fa-sort"></i></th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="appealsList">
                            <tr><td colspan="8" style="text-align: center; padding: 40px;">Загрузка обращений...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> Редактирование обращения</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Имя контрагента</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Тип обращения</label>
                    <select id="editType" required>
                        <option value="Вопрос">Вопрос</option>
                        <option value="Заказ">Заказ</option>
                        <option value="Жалоба">Жалоба</option>
                        <option value="Предложение">Предложение</option>
                        <option value="Рекламация">Рекламация</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ответственный</label>
                    <select id="editResponsible">
                        <option value="">Выберите ответственного</option>
                        <option value="Администратор">👨‍💼 Администратор</option>
                        <option value="Менеджер">📋 Менеджер</option>
                        <option value="Кладовщик">📦 Кладовщик</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="editEmail" required>
                </div>
                <div class="form-group">
                    <label>Суть обращения</label>
                    <textarea id="editDescription" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <select id="editStatus">
                        <option value="Новое">Новое</option>
                        <option value="В обработке">В обработке</option>
                        <option value="Завершено">Завершено</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Сохранить изменения</button>
            </form>
        </div>
    </div>

    <script>
        let appeals = [];
        let nextId = 1;
        let currentSort = { column: null, direction: 'asc' };

        function loadData() {
            const saved = localStorage.getItem('techopt_appeals');
            if (saved) {
                appeals = JSON.parse(saved);
                nextId = Math.max(...appeals.map(a => a.id), 0) + 1;
            } else {
                appeals = [
                    { id: 1, date: '2026-04-20', name: 'ООО "Электро-Сервис"', type: 'Заказ', source: 'Сайт', responsible: 'Менеджер', email: 'sales@elektro-service.ru', description: 'Заявка на оптовую закупку микроволновых печей Samsung - 50 шт.', status: 'Новое' },
                    { id: 2, date: '2026-04-19', name: 'ИП Петров', type: 'Вопрос', source: 'Сайт', responsible: 'Администратор', email: 'petrov@mail.ru', description: 'Уточнение условий доставки и гарантии.', status: 'В обработке' },
                    { id: 3, date: '2026-04-18', name: 'ООО "Бытовая Техника"', type: 'Предложение', source: 'Сайт', responsible: 'Кладовщик', email: 'info@bit.ru', description: 'Предложение сотрудничества по новым брендам.', status: 'Новое' }
                ];
                saveData();
                nextId = 4;
            }
            renderTable();
            updateStats();
        }

        function saveData() {
            localStorage.setItem('techopt_appeals', JSON.stringify(appeals));
        }

        function getCurrentDate() {
            const today = new Date();
            return today.toISOString().split('T')[0];
        }

        document.getElementById('date').value = getCurrentDate();

        document.getElementById('appealForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newAppeal = {
                id: nextId++,
                date: getCurrentDate(),
                name: document.getElementById('name').value,
                type: document.getElementById('type').value,
                source: 'Сайт',
                responsible: document.getElementById('responsible').value || 'Не назначен',
                email: document.getElementById('email').value,
                description: document.getElementById('description').value,
                status: 'Новое'
            };
            
            appeals.unshift(newAppeal);
            saveData();
            renderTable();
            updateStats();
            
            document.getElementById('appealForm').reset();
            document.getElementById('date').value = getCurrentDate();
            
            showToast('Обращение успешно создано!');
        });

        function renderTable() {
            const tbody = document.getElementById('appealsList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = appeals.filter(a => 
                a.name.toLowerCase().includes(searchTerm) || 
                a.email.toLowerCase().includes(searchTerm)
            );
            
            if (currentSort.column !== null) {
                filtered.sort((a, b) => {
                    let valA, valB;
                    switch(currentSort.column) {
                        case 0: valA = a.id; valB = b.id; break;
                        case 1: valA = a.date; valB = b.date; break;
                        case 2: valA = a.name; valB = b.name; break;
                        case 3: valA = a.type; valB = b.type; break;
                        case 4: valA = a.source; valB = b.source; break;
                        case 5: valA = a.responsible; valB = b.responsible; break;
                        case 6: valA = a.status; valB = b.status; break;
                        default: return 0;
                    }
                    if (currentSort.direction === 'asc') {
                        return valA > valB ? 1 : -1;
                    } else {
                        return valA < valB ? 1 : -1;
                    }
                });
            }
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px;">Нет обращений</td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(a => `
                <tr>
                    <td>${a.id}</td>
                    <td>${a.date}</td>
                    <td><strong>${escapeHtml(a.name)}</strong><br><small style="color: #888;">${escapeHtml(a.email)}</small></td>
                    <td>${getTypeIcon(a.type)} ${a.type}</td>
                    <td><i class="fas fa-globe"></i> ${a.source}</td>
                    <td>${a.responsible ? escapeHtml(a.responsible) : '<span style="color: #888;">Не назначен</span>'}</td>
                    <td>${getStatusBadge(a.status)}</td>
                    <td class="action-btns">
                        <button class="export-excel-btn" onclick="exportToExcel(${a.id})" title="Сохранить в Excel"><i class="fas fa-file-excel"></i></button>
                        <button class="edit-btn" onclick="editAppeal(${a.id})"><i class="fas fa-edit"></i></button>
                        <button class="delete-btn" onclick="deleteAppeal(${a.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }
        
        function exportToExcel(id) {
            const appeal = appeals.find(a => a.id === id);
            if (!appeal) return;
            
            const data = [
                ['Параметр', 'Значение'],
                ['ID обращения', appeal.id],
                ['Дата создания', appeal.date],
                ['Контрагент', appeal.name],
                ['Тип обращения', appeal.type],
                ['Источник', appeal.source],
                ['Ответственный', appeal.responsible || 'Не назначен'],
                ['Email', appeal.email],
                ['Статус', appeal.status],
                ['Суть обращения', appeal.description]
            ];
            
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(data);
            ws['!cols'] = [{wch:20}, {wch:50}];
            XLSX.utils.book_append_sheet(wb, ws, `Обращение_${appeal.id}`);
            XLSX.writeFile(wb, `Обращение_${appeal.id}_${appeal.name.replace(/[^а-яА-Яa-zA-Z0-9]/g, '_')}.xlsx`);
            showToast(`Обращение #${appeal.id} сохранено в Excel!`);
        }
        
        function exportAllToExcel() {
            if (appeals.length === 0) {
                showToast('Нет обращений для экспорта');
                return;
            }
            
            const headers = ['ID', 'Дата', 'Контрагент', 'Тип', 'Источник', 'Ответственный', 'Email', 'Статус', 'Суть обращения'];
            const rows = appeals.map(a => [
                a.id, a.date, a.name, a.type, a.source,
                a.responsible || 'Не назначен', a.email, a.status, a.description
            ]);
            
            const allData = [headers, ...rows];
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(allData);
            ws['!cols'] = [{wch:8}, {wch:12}, {wch:30}, {wch:15}, {wch:10}, {wch:20}, {wch:25}, {wch:12}, {wch:60}];
            XLSX.utils.book_append_sheet(wb, ws, 'Все_обращения');
            XLSX.writeFile(wb, `Обращения_${getCurrentDate()}.xlsx`);
            showToast(`Экспортировано ${appeals.length} обращений в Excel!`);
        }
        
        function getTypeIcon(type) {
            const icons = { 'Вопрос': '❓', 'Заказ': '🛒', 'Жалоба': '⚠️', 'Предложение': '💡', 'Рекламация': '📦' };
            return icons[type] || '📝';
        }
        
        function getStatusBadge(status) {
            const classes = { 'Новое': 'status-new', 'В обработке': 'status-processing', 'Завершено': 'status-done' };
            return `<span class="${classes[status] || 'status-new'}">${status}</span>`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function searchAppeals() { renderTable(); }
        
        function sortTable(column) {
            if (currentSort.column === column) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = column;
                currentSort.direction = 'asc';
            }
            renderTable();
        }
        
        function editAppeal(id) {
            const appeal = appeals.find(a => a.id === id);
            if (appeal) {
                document.getElementById('editId').value = appeal.id;
                document.getElementById('editName').value = appeal.name;
                document.getElementById('editType').value = appeal.type;
                document.getElementById('editResponsible').value = appeal.responsible;
                document.getElementById('editEmail').value = appeal.email;
                document.getElementById('editDescription').value = appeal.description;
                document.getElementById('editStatus').value = appeal.status;
                document.getElementById('editModal').style.display = 'flex';
            }
        }
        
        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = parseInt(document.getElementById('editId').value);
            const index = appeals.findIndex(a => a.id === id);
            
            if (index !== -1) {
                appeals[index] = {
                    ...appeals[index],
                    name: document.getElementById('editName').value,
                    type: document.getElementById('editType').value,
                    responsible: document.getElementById('editResponsible').value,
                    email: document.getElementById('editEmail').value,
                    description: document.getElementById('editDescription').value,
                    status: document.getElementById('editStatus').value
                };
                saveData();
                renderTable();
                updateStats();
                closeModal();
                showToast('Изменения сохранены!');
            }
        });
        
        function deleteAppeal(id) {
            if (confirm('Вы уверены, что хотите удалить это обращение?')) {
                appeals = appeals.filter(a => a.id !== id);
                saveData();
                renderTable();
                updateStats();
                showToast('Обращение удалено');
            }
        }
        
        function updateStats() {
            document.getElementById('totalCount').textContent = appeals.length;
            document.getElementById('newCount').textContent = appeals.filter(a => a.status === 'Новое').length;
            document.getElementById('processingCount').textContent = appeals.filter(a => a.status === 'В обработке').length;
            document.getElementById('doneCount').textContent = appeals.filter(a => a.status === 'Завершено').length;
        }
        
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) closeModal();
        }
        
        loadData();
    </script>
</body>
